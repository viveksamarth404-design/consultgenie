<svg viewBox="0 0 900 1100" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7a6e"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3a8c"/>
      <stop offset="100%" style="stop-color:#5046a0"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12"/>
      <stop offset="100%" style="stop-color:#9a3412"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1100" fill="url(#bg)"/>
  
  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="900" height="1100" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="1">ConsultGenie</text>
  <text x="450" y="68" text-anchor="middle" font-size="12" fill="#6b7280" letter-spacing="3">ARCHITECTURE DIAGRAM</text>
  <line x1="300" y1="78" x2="600" y2="78" stroke="#0d9488" stroke-width="1" opacity="0.5"/>

  <!-- ── BOX 1: Streamlit UI ── -->
  <rect x="250" y="95" width="400" height="72" rx="10" fill="url(#teal)" filter="url(#shadow)"/>
  <rect x="250" y="95" width="400" height="72" rx="10" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.8"/>
  <text x="450" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Streamlit UI</text>
  <text x="450" y="148" text-anchor="middle" font-size="11" fill="#99f6e4">Business problem + industry sector input</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="167" x2="450" y2="198" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── BOX 2: Gemini Decomposition ── -->
  <rect x="220" y="200" width="460" height="78" rx="10" fill="url(#purple)" filter="url(#shadow)"/>
  <rect x="220" y="200" width="460" height="78" rx="10" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <text x="450" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Gemini — Problem Decomposition</text>
  <text x="450" y="250" text-anchor="middle" font-size="11" fill="#c4b5fd">Understands context · Identifies frameworks</text>
  <text x="450" y="268" text-anchor="middle" font-size="11" fill="#c4b5fd">Outputs QUERY: lines if web research is needed</text>

  <!-- Arrow 2→ diamond -->
  <line x1="450" y1="278" x2="450" y2="318" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── DIAMOND: Search needed? ── -->
  <polygon points="450,322 530,362 450,402 370,362" fill="#1e1e3a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="357" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Search</text>
  <text x="450" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">needed?</text>

  <!-- YES label + arrow left to Tavily -->
  <text x="328" y="356" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">YES</text>
  <line x1="370" y1="362" x2="240" y2="362" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <!-- Down from Tavily -->
  <line x1="175" y1="430" x2="175" y2="530" stroke="#10b981" stroke-width="1.5"/>
  <line x1="175" y1="530" x2="262" y2="530" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- NO label + arrow right bypass -->
  <text x="572" y="356" text-anchor="middle" font-size="11" fill="#f87171" font-weight="600">NO</text>
  <line x1="530" y1="362" x2="660" y2="362" stroke="#f87171" stroke-width="1.5"/>
  <line x1="660" y1="362" x2="660" y2="530" stroke="#f87171" stroke-width="1.5"/>
  <line x1="660" y1="530" x2="638" y2="530" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── BOX 3: Tavily Search ── -->
  <rect x="60" y="405" width="230" height="78" rx="10" fill="url(#rust)" filter="url(#shadow)"/>
  <rect x="60" y="405" width="230" height="78" rx="10" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.6"/>
  <text x="175" y="434" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Tavily Search API</text>
  <text x="175" y="454" text-anchor="middle" font-size="11" fill="#fca5a5">Live web research</text>
  <text x="175" y="471" text-anchor="middle" font-size="11" fill="#fca5a5">Best practices · Expert frameworks</text>

  <!-- ── BOX 4: Framework Analysis ── -->
  <rect x="265" y="492" width="370" height="75" rx="10" fill="url(#purple)" filter="url(#shadow)"/>
  <rect x="265" y="492" width="370" height="75" rx="10" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <text x="450" y="522" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Framework Analysis</text>
  <text x="450" y="542" text-anchor="middle" font-size="11" fill="#c4b5fd">SWOT · Root Cause Analysis · Gap Analysis</text>
  <text x="450" y="559" text-anchor="middle" font-size="11" fill="#c4b5fd">Porter's Five Forces</text>

  <!-- Arrow 4→5 -->
  <line x1="450" y1="567" x2="450" y2="600" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── BOX 5: Report Generation ── -->
  <rect x="220" y="602" width="460" height="78" rx="10" fill="url(#purple)" filter="url(#shadow)"/>
  <rect x="220" y="602" width="460" height="78" rx="10" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <text x="450" y="632" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Gemini — Report Generation</text>
  <text x="450" y="652" text-anchor="middle" font-size="11" fill="#c4b5fd">Problem Framing · Root Cause Analysis</text>
  <text x="450" y="670" text-anchor="middle" font-size="11" fill="#c4b5fd">Key Findings · Actionable Recommendations</text>

  <!-- Arrow 5→6 -->
  <line x1="450" y1="680" x2="450" y2="713" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── BOX 6: LLM-as-Judge ── -->
  <rect x="220" y="715" width="460" height="78" rx="10" fill="url(#amber)" filter="url(#shadow)"/>
  <rect x="220" y="715" width="460" height="78" rx="10" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.8"/>
  <text x="450" y="745" text-anchor="middle" font-size="14" font-weight="700" fill="#fef3c7">Gemini — LLM-as-Judge</text>
  <text x="450" y="765" text-anchor="middle" font-size="11" fill="#fcd34d">Structure · Logical Reasoning · Relevance · Actionability</text>
  <text x="450" y="783" text-anchor="middle" font-size="11" fill="#fcd34d">Overall Score (0–10) + Specific Feedback</text>

  <!-- Arrow 6→7 -->
  <line x1="450" y1="793" x2="450" y2="826" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── BOX 7: Final Output ── -->
  <rect x="250" y="828" width="400" height="72" rx="10" fill="url(#teal)" filter="url(#shadow)"/>
  <rect x="250" y="828" width="400" height="72" rx="10" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.8"/>
  <text x="450" y="858" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Final Output — Streamlit UI</text>
  <text x="450" y="880" text-anchor="middle" font-size="11" fill="#99f6e4">Consulting Report + Score (0–10) + Judge Feedback</text>

  <!-- ── LEGEND ── -->
  <rect x="60" y="930" width="780" height="130" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="450" y="955" text-anchor="middle" font-size="11" fill="#9ca3af" letter-spacing="2">LEGEND</text>

  <!-- UI Layer -->
  <rect x="90" y="968" width="16" height="16" rx="3" fill="url(#teal)"/>
  <text x="114" y="981" font-size="11" fill="#d1d5db">UI Layer (Streamlit)</text>

  <!-- Gemini LLM -->
  <rect x="270" y="968" width="16" height="16" rx="3" fill="url(#purple)"/>
  <text x="294" y="981" font-size="11" fill="#d1d5db">Gemini LLM Calls</text>

  <!-- Tavily -->
  <rect x="450" y="968" width="16" height="16" rx="3" fill="url(#rust)"/>
  <text x="474" y="981" font-size="11" fill="#d1d5db">Tavily Search Tool</text>

  <!-- Judge -->
  <rect x="630" y="968" width="16" height="16" rx="3" fill="url(#amber)"/>
  <text x="654" y="981" font-size="11" fill="#d1d5db">LLM-as-Judge</text>

  <!-- Note -->
  <text x="450" y="1018" text-anchor="middle" font-size="10.5" fill="#6b7280">⬥  Agentic decision point: agent autonomously decides whether to invoke Tavily based on problem context</text>
  <text x="450" y="1038" text-anchor="middle" font-size="10.5" fill="#6b7280">Green path = search invoked · Red path = search skipped, uses domain knowledge only</text>
  <text x="450" y="1058" text-anchor="middle" font-size="10" fill="#4b5563">ConsultGenie · ECE Semester IV · B.Tech ECE-A · 2025–26</text>
</svg>
